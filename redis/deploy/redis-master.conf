# Redis主节点配置文件
# 端口
port 6379

# 绑定地址
bind 0.0.0.0

# 后台运行
daemonize yes

# 日志文件
logfile "/var/log/redis/redis-master.log"

# 数据目录
dir /var/lib/redis

# 数据库数量
databases 16

# RDB持久化配置
save 900 1
save 300 10
save 60 10000

# RDB文件名
dbfilename dump-master.rdb

# AOF持久化配置
appendonly yes
appendfilename "appendonly-master.aof"

# 密码设置
requirepass "redis123456"

# 主节点密码（从节点连接时使用）
masterauth "redis123456"

# 最大客户端连接数
maxclients 10000

# 内存淘汰策略
maxmemory-policy allkeys-lru

# 慢查询日志
slowlog-log-slower-than 10000
slowlog-max-len 128